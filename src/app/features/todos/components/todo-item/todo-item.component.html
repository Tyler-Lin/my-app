@if (isEditing()) {
  <app-todo-form
    [todo]="todo()"
    (submitted)="onEditSubmit($event)"
    (cancelled)="isEditing.set(false)"
  />
} @else {
  <div class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800 group">
    <input
      type="checkbox"
      [id]="'todo-' + todo().id"
      [checked]="todo().completed"
      (change)="toggled.emit(todo().id)"
      class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer"
      [attr.aria-label]="'Mark ' + todo().title + ' as ' + (todo().completed ? 'active' : 'complete')"
    />
    <label
      [for]="'todo-' + todo().id"
      class="flex-1 text-sm cursor-pointer select-none"
      [class]="titleClass()"
    >
      {{ todo().title }}
    </label>
    <span
      class="px-2 py-0.5 text-xs font-medium rounded-full"
      [class]="priorityBadgeClass()"
    >
      {{ todo().priority }}
    </span>
    <div class="flex gap-1 opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition-opacity">
      <button
        type="button"
        (click)="isEditing.set(true)"
        class="p-1 text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
        [attr.aria-label]="'Edit ' + todo().title"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
        </svg>
      </button>
      <button
        type="button"
        (click)="deleted.emit(todo().id)"
        class="p-1 text-gray-400 hover:text-red-600 dark:hover:text-red-400 rounded focus:outline-none focus:ring-2 focus:ring-red-500"
        [attr.aria-label]="'Delete ' + todo().title"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      </button>
    </div>
  </div>
}
