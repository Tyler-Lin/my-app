<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-3 p-4 bg-white border border-gray-200 rounded-lg shadow-sm">
  <div class="flex flex-col gap-1">
    <label for="todo-title" class="text-sm font-medium text-gray-700">
      Title <span aria-hidden="true" class="text-red-500">*</span>
    </label>
    <input
      id="todo-title"
      type="text"
      formControlName="title"
      placeholder="What needs to be done?"
      autocomplete="off"
      class="px-3 py-2 border rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      [class.border-red-400]="form.controls.title.invalid && form.controls.title.touched"
      [class.border-gray-300]="!(form.controls.title.invalid && form.controls.title.touched)"
      [attr.aria-invalid]="form.controls.title.invalid && form.controls.title.touched"
      aria-describedby="title-error"
    />
    @if (form.controls.title.invalid && form.controls.title.touched) {
      <span id="title-error" class="text-xs text-red-600" role="alert">
        @if (form.controls.title.errors?.['required']) {
          Title is required.
        } @else if (form.controls.title.errors?.['maxlength']) {
          Title must be 200 characters or fewer.
        }
      </span>
    }
  </div>

  <div class="flex flex-col gap-1">
    <label for="todo-priority" class="text-sm font-medium text-gray-700">Priority</label>
    <select
      id="todo-priority"
      formControlName="priority"
      class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
    >
      @for (p of priorities; track p.value) {
        <option [value]="p.value">{{ p.label }}</option>
      }
    </select>
  </div>

  <div class="flex gap-2 justify-end">
    <button
      type="button"
      (click)="onCancel()"
      class="px-4 py-2 text-sm text-gray-600 bg-gray-100 rounded-md hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-400"
    >
      Cancel
    </button>
    <button
      type="submit"
      [disabled]="form.invalid"
      class="px-4 py-2 text-sm text-white bg-blue-600 rounded-md hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-blue-500"
    >
      {{ submitLabel() }}
    </button>
  </div>
</form>
